<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High Sport Lights</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧔🏻‍♂️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <div class="page">

    <!-- HEADER -->
    <header class="hdr">
      <div class="hdr-top">
        <div class="pill" id="statusBadge">
          <span class="pill-dot" id="statusDot"></span>
          <span id="statusText">Loading</span>
        </div>
        <div class="hdr-btns">
          <button class="sq" id="themeBtn" aria-label="Toggle theme">
            <svg class="i-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.73 12.73 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="i-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="sq" id="refreshBtn" aria-label="Refresh">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
      <h1 class="title">High Sport Lights</h1>
      <div class="hdr-sub">
        <span class="date" id="dateDisplay"></span>
        <span class="hdr-dot"></span>
        <span class="counter" id="highlightCount"></span>
      </div>
    </header>

    <!-- DAY PICKER -->
    <nav class="days" id="dayBar"></nav>

    <!-- SPORT FILTERS -->
    <nav class="filters" id="filterBar">
      <button class="chip on" data-filter="all"><span>All</span></button>
      <button class="chip" data-filter="Football"><span>⚽</span><span>Football</span></button>
      <button class="chip" data-filter="Basketball"><span>🏀</span><span>Basketball</span></button>
      <button class="chip" data-filter="NBA"><span>🏀</span><span>NBA</span></button>
      <button class="chip" data-filter="F1"><span>🏎️</span><span>F1</span></button>
    </nav>

    <!-- GRID -->
    <section class="grid" id="highlightsGrid">
      <div class="card sk"><div class="sk-img"></div><div class="sk-bd"><div class="sk-l w70"></div><div class="sk-l w40"></div></div></div>
      <div class="card sk"><div class="sk-img"></div><div class="sk-bd"><div class="sk-l w70"></div><div class="sk-l w40"></div></div></div>
      <div class="card sk"><div class="sk-img"></div><div class="sk-bd"><div class="sk-l w70"></div><div class="sk-l w40"></div></div></div>
      <div class="card sk"><div class="sk-img"></div><div class="sk-bd"><div class="sk-l w70"></div><div class="sk-l w40"></div></div></div>
    </section>

    <!-- EMPTY -->
    <div class="empty" id="emptyState" style="display:none">
      <p>No highlights found</p>
    </div>

    <!-- FOOTER -->
    <footer class="ft">
      <span>Auto-refresh 30 min</span>
      <span id="lastUpdated"></span>
      <span class="ft-sep">|</span>
      <span class="ft-credit">Crafted by <strong>Yonatan R.</strong></span>
    </footer>
  </div>

  <!-- VIDEO PLAYER MODAL -->
  <div class="player-overlay" id="playerOverlay">
    <div class="player-wrap">
      <button class="player-close" id="playerClose" aria-label="Close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="player-frame" id="playerFrame"></div>
    </div>
  </div>

  <script src="logos.js"></script>
  <script src="app.js"></script>
</body>
</html>
